name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project if uploaded as a zip
        run: |
          if [ -f "FacelessStudioAI.zip" ]; then
            echo "Found FacelessStudioAI.zip — extracting..."
            unzip -o FacelessStudioAI.zip -d extracted
            cp -rf extracted/FacelessStudioAI/. .
            rm -rf extracted
          else
            echo "No zip found — assuming project files are already unpacked at repo root."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: FacelessStudioAI-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
